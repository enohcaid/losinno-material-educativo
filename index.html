<head>

  <style>
    :root {
      --teal: #1e6e6e;
      --teal-light: #a2d0d0;
      --gold: #c9a66b;
      --cream: #f9f6f0;
      --dark: #2c2c2c;
      --white: #ffffff;
      --border: #e8e0d4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── LOADING ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 40px;
    }
    .loading-logo { width: 200px; opacity: 0.85; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--teal-light);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; color: #888; }

    /* ── ERROR ── */
    #error {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }
    .error-icon { font-size: 48px; }
    .error-title { font-size: 22px; font-weight: 700; color: var(--teal); }
    .error-msg { font-size: 15px; color: #888; max-width: 340px; line-height: 1.6; }

    /* ── CONTENIDO ── */
    #content { display: none; max-width: 680px; margin: 0 auto; padding: 0 0 60px; }

    /* Header */
    .page-header {
      background: var(--teal);
      padding: 32px 24px 24px;
      text-align: center;
    }
    .header-logo { width: 180px; margin-bottom: 16px; }
    .header-paciente {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .header-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--white);
      line-height: 1.2;
    }
    .header-fecha {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 10px;
    }

    /* Temas */
    .tema {
      background: var(--white);
      margin: 16px 16px 0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .tema-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }
    .tema-body { padding: 20px 20px 24px; }
    .tema-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--teal);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .tema-subtitle {
      font-size: 13px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 0.04em;
      margin-bottom: 16px;
    }
    .tema-heading {
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--teal);
      margin: 16px 0 8px;
      padding-bottom: 4px;
      border-bottom: 2px solid var(--teal-light);
    }
    .tema-heading:first-child { margin-top: 0; }
    .tema-text {
      font-size: 14px;
      line-height: 1.7;
      color: var(--dark);
      margin-bottom: 8px;
    }
    .tema-bullets { list-style: none; margin: 0; padding: 0; }
    .tema-bullets li {
      font-size: 14px;
      line-height: 1.6;
      color: var(--dark);
      padding: 4px 0 4px 18px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .tema-bullets li:last-child { border-bottom: none; }
    .tema-bullets li::before {
      content: '';
      position: absolute;
      left: 4px;
      top: 12px;
      width: 6px;
      height: 6px;
      background: var(--teal-light);
      border-radius: 50%;
    }

    /* Banner intermedio */
    .mid-banner {
      margin: 16px 16px 0;
      border-radius: 16px;
      overflow: hidden;
      height: 120px;
    }
    .mid-banner img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Footer */
    .page-footer {
      margin: 24px 16px 0;
      text-align: center;
    }
    .footer-logo { width: 160px; opacity: 0.7; }
    .footer-text {
      font-size: 11px;
      color: #aaa;
      margin-top: 8px;
      line-height: 1.5;
    }

    /* ── RESPONSIVE ── */
    @media (min-width: 600px) {
      .tema { margin: 20px 24px 0; }
      .mid-banner { margin: 20px 24px 0; }
      .page-footer { margin: 28px 24px 0; }
      .tema-img { height: 200px; }
    }
  </style>
</head>

      { type: 'bullets', content: ['Lavar y cocinar 1 taza de mijo con 2.5 tazas de agua (absorción).','Condimentar caliente: sal rosada, cúrcuma, comino, ajo en polvo, perejil.','Procesar la mitad para cohesión; mezclar con la otra mitad.','Formar y dorar en sartén de acero con unas gotas de oliva.','Se conservan 3-4 días en la heladera o se pueden frizar.'] },
      { type: 'heading', content: 'Ensalada de quínoa y amaranto' },
      { type: 'bullets', content: ['Cocinar ½ taza de quínoa + ½ de amaranto juntos (2 tazas de agua).','Dejar enfriar completamente antes de usar.','Agregar: pepino, tomate cherry, palta, cebolla morada, cilantro o perejil.','Aderezo: aceite de oliva + limón + sal rosada + pimienta.','Opcional: semillas de sésamo tostado o chía por encima.'] },

    title: 'Caldo de Huesos',
    subtitle: 'Alimento reconstituyente para el intestino, las articulaciones y el sistema inmune',
    sections: [
      { type: 'heading', content: '¿Por qué es tan valioso?' },
      { type: 'text', content: 'El caldo de huesos es rico en colágeno, gelatina, glucosamina, condroitina y minerales biodisponibles. Repara la mucosa intestinal, mejora las articulaciones, fortalece el cabello y las uñas, y nutre profundamente el organismo.' },
      { type: 'heading', content: 'Ingredientes (para 3-4 litros)' },
      { type: 'bullets', content: ['1-1.5 kg de huesos de vaca (preferentemente con tuétano y articulaciones).','Opcional: carcasa de pollo de campo o patas de pollo.','2 zanahorias, 2 ramas de apio, 1 cebolla entera, 4 dientes de ajo.','1 puerro, 1 trozo de jengibre, 1 trozo de alga kombu.','2 cucharadas de vinagre de manzana orgánico (fundamental: extrae los minerales del hueso).','Sal marina, pimienta, laurel, orégano, perejil.'] },
      { type: 'heading', content: 'Preparación' },
      { type: 'bullets', content: ['Paso 1: Blanquear los huesos — cubrir con agua fría, llevar a hervor 5 min y tirar el agua (elimina impurezas).','Paso 2: Asar los huesos en horno 200° por 30 min (intensifica el sabor).','Paso 3: Colocar todo en olla grande (o olla a presión) con agua fría que cubra bien.','Paso 4: Agregar el vinagre de manzana y dejar reposar 30 min antes de encender el fuego.','Paso 5: Llevar a hervor suave, espumar bien los primeros 30 min, luego tapar y cocinar.'] },
      { type: 'heading', content: 'Tiempo de cocción' },
      { type: 'bullets', content: ['Olla convencional: 12 a 24 horas a fuego muy bajo (cuanto más, mejor).','Olla a presión: 3 a 4 horas.','El caldo está listo cuando los huesos se deshacen y el líquido tiene cuerpo.'] },
      { type: 'heading', content: 'Conservación y uso' },
      { type: 'bullets', content: ['Colar y dejar enfriar. Al enfriarse debe solidificarse (señal de calidad).','Heladera: hasta 5 días. Freezer: hasta 3 meses en porciones.','Tomar 1-2 tazas por día como consomé, o usar como base para sopas y guisos.','Agregar levadura nutricional, cúrcuma o limón al momento de servir.'] },
      { type: 'quote', content: 'El caldo de huesos es uno de los alimentos más reparadores que existen. No hay suplemento de colágeno que lo supere.', author: 'Dra. Silvia Losinno' }
    ]
  },

    sections: [
      { type: 'heading', content: 'Leche de almendras (base)' },
      { type: 'bullets', content: ['Activar 1 taza de almendras (remojo 8-12 hs). Pelar si se desea.','Licuar con 3-4 tazas de agua filtrada hasta obtener una mezcla homogénea.','Colar con bolsa de leche vegetal o tela. Exprimir bien.','Guardar en frasco de vidrio en heladera hasta 3-4 días.','Endulzar con dátiles, stevia o miel + esencia de vainilla si se desea.'] },
      { type: 'heading', content: 'Leche de coco' },

    imageAlts: [

      'https://images.unsplash.com/photo-1545205597-3d9d02c29597?w=840&h=240&fit=crop&crop=center',
    ],
    icon: '🧘', label: 'Mindful Eating y Autocuidado',
    title: 'Mindful Eating y Autocuidado',
    subtitle: 'Herramientas para una relacion consciente con tu alimentacion',
    sections: [
      { type: 'heading', content: 'Antes de empezar a comer' },
      { type: 'text', content: 'Crear el espacio y el tiempo para comer con presencia y consciencia, dejando los estimulos externos y los juicios internos de lado, dedicandote un momento para vos, para nutrirte y hacer del acto del comer lo mas sagrado que se pueda. No tiene que ser perfecto ni un ideal, solo ayudarte a dar varios pasos para conectarte mas aun con tu presente y tu cuerpo. La comida puede ser un puente entre como te sentis y como te queres sentir.' },
      { type: 'bullets', content: [
        'Tratar de observar las emociones. Registrar el hambre. ¿Es hambre o necesito algo que me reconforte?',
        'Generar un espacio para comer sin television o celular para poder registrar y ser consciente del acto. Aunque sea poco tiempo, dale la importancia que se merece.',
        'Cocinar a partir de alimentos reales, alimentos que nos nutran.',
        'Involucrar los sentidos y tratar de estar comodos, sentados, erguidos para una buena postura de digestion.',
        'Podes poner musica que relaje o prender alguna vela para generar un momento lindo para vos o para compartir.',
        'Chequear tus niveles de hambre al crear tu plato completo. Con ingredientes de calidad.',
        'Arma un plato lindo, agradable, colorido y con una porcion logica que crees que necesitas.',
        'Toma un vaso de agua.',
        'Cerra los ojos y hace tres respiraciones profundas: Inhalo el aire en 4 tiempos, retengo en 7 tiempos y exhalo en 8 tiempos.',
        'Observa tus pensamientos y emociones.',
        'Mirar el alimento, olerlo, tocarlo (si se puede), saborearlo, morderlo.',
        'Masticar: sentir el sabor y sensacion. Trata de masticar tranquila cada bocado. Podes apoyar los cubiertos entre bocado y bocado.',
        'Trata de tomar agua cuando la necesites, pero no en mucha cantidad durante las comidas. Es mejor hidratarte bien antes y despues de las comidas principales.',
        'Disfrutar del acto, de lo que elijo. Agradecer.'
      ]},
      { type: 'heading', content: 'Escala del hambre' },
      { type: 'text', content: 'La escala del hambre es una herramienta practica para volver a conectar con las senales que el organismo tiene naturalmente para autorregularse. Es importante entender que estas senales estaran cada vez mas "limpias" y en equilibrio en la medida en que nuestra alimentacion sea cada vez mas consciente y de calidad. El hambre no es lineal. Especialmente en las mujeres, puede ser muy ciclico ya que fisiologicamente somos mas ciclicas que los hombres. Este tipo de herramientas son un soporte para volver a confiar en las senales que el cuerpo manifiesta de momento a momento.' },
      { type: 'bullets', content: [
        '1 — Hambre extrema: de mal humor, acidez, comerias cualquier cosa con una carga de ansiedad. Irritable.',
        '2 — Mucha hambre: sensacion de estomago vacio, ruidos, dolor. Comer lo que sea rapido.',
        '3 — Hambre (IDEAL para iniciar): nivel ideal para pensar en iniciar una comida. Con posibilidad de eleccion, elaboracion y momento para Mindful Eating.',
        '4 — Poca hambre: empiezo a sentir satisfaccion mientras como. Disfruto las sensaciones.',
        '5 — Neutral: empiezo a sentir saciedad. Ya no tengo hambre, pero tampoco estoy con una sensacion de plenitud excesiva.',
        '6 — Casi llena: satisfecho. Ya no se empieza a ir el hambre por completo. Empezamos a disminuir el ritmo o dejamos de comer.',
        '7 — Llena y satisfecha (IDEAL para finalizar): sensacion neutra entre comodidad e incomodidad. Si sigo posiblemente comience a estar mas incomodo.',
        '8 — Muy llena: sensacion incomoda de saciedad.',
        '9 — Muy llena o incomoda: plenitud. Cansancio. Necesito acostarme. Muy distendida.',
        '10 — Saturada: dolor de estomago. Sensacion de explotar. Acidez, nauseas. Dificultad para respirar.'
      ]},
      { type: 'text', content: 'IDEAL: comenzar con un 3 y finalizar con un 7. Es un ejercicio de observacion mas consciente. Comer con atencion plena nos permite conectarnos con esta herramienta y al comer mas pausado, podemos identificar y lograr un proceso gradual en escala. Si este ejercicio pasa a ser un estresor o alarma nueva para tu cuerpo, no la sigas usando.' },
      { type: 'heading', content: 'Contextualizar tu hambre' },
      { type: 'bullets', content: [
        '¿A que horarios de cada dia me suele aparecer mucha hambre?',
        '¿Como varia esto segun la estacion del ano, momento del ciclo, mi nivel de estres, mi comida previa?',
        '¿Que dias o en que momentos suelo sentir mas hambre en base a mi ciclo? ¿Como me manejo en esas situaciones?',
        '¿Que puedo dejar preparado y a mano?',
        '¿Que actitud al comer puedo tomar antes o durante la comida para evitar llegar al nivel 10?',
        '¿Que actitud me hara bien tener conmigo misma si es que llego al nivel 10?'
      ]},
      { type: 'quote', content: 'Es informacion para observar, reflexionar, pero no para juzgar.', author: 'Dra. Silvia Losinno' },
      { type: 'heading', content: 'Ejercicio de la pasa de uva — Mindful Eating' },
      { type: 'text', content: 'Podes hacer este ejercicio con alguien que te guie.' },
      { type: 'bullets', content: [
        '1. Sentarnos en una silla. Que los pies toquen el piso en lo posible. Sentir los apoyos que sostienen a tu cuerpo.',
        '2. Agarrar una pasa de uva y sostenerla con la palma de la mano o con los dedos. Mantener la concentracion en la pasa como si fuera la primera vez. ¿Que peso tiene? ¿La noto en la mano? ¿Proyecta una sombra sobre la palma de la mano?',
        '3. VER: tomar un poco de tiempo para ver realmente la pasa imaginando que nunca miraste una tan detalladamente. Observarla con toda la atencion, dejando que los ojos exploren los puntos de luz, los agujeros oscuros, los pliegos, los contrastes de colores.',
        '4. TOCAR: mover la pasa entre los dedos explorando su textura. Apretarla.',
        '5. OLER: acercar la pasa a la nariz y percibir las sensaciones con cada inspiracion. ¿Tiene algun tipo de olor?',
        '6. COLOCAR: acercar la pasa adentro de la boca de manera lenta. Fijaremos como la mano y el brazo saben exactamente donde colocar la pasa. Sin masticarla, exploraremos las sensaciones que nos aporta a la lengua.',
        '7. MASTICAR: morder conscientemente y percibir los efectos de la fruta en la boca, centrandonos en los sabores. Prestar atencion a la textura, sin tragar.',
        '8. TRAGAR: observar si somos capaces de detectar la primera intencion de tragarse la pasa. Apreciar los movimientos de preparacion que hacemos con la lengua.',
        '9. Tener en cuenta que la pasa va pasar por el esofago y luego al estomago, donde predomina nuestro fuego digestivo para empezar la digestion mas potente.',
        '10. Efectos posteriores: ¿persiste su sabor en la boca? ¿Que sensaciones se tienen en no tenerla? ¿Existe un impulso para comerte otra pasa?'
      ]},
      { type: 'heading', content: 'Mindful Pooping — defecar con atencion plena' },
      { type: 'text', content: 'Nuestra digestion comienza a traves de los sentidos y finaliza cuando la materia fecal ingresa al inodoro. Cuando tengas ganas de defecar, si te es posible, hacelo. No te inhibas. No actues en contra de lo que te pide el cuerpo: es fisiologia pura. Ademas, las heces se deshidratan y cuando quieras sacarlas para afuera, te va a costar mas. Mucha gente no sabe que la inmensa mayoria de los occidentales defecamos MAL. El ser humano tiene una anatomia que nos pide defecar en cuclillas. En cuclillas se relaja y las heces salen con mayor facilidad, por eso colocar un banquito especifico o elevar un poco las rodillas con algun objeto puede favorecer. Intenta no llevar el celular asi aprovechas ese momento intimo con vos mismo: se liberan endorfinas al hacer una deposicion.' },
      { type: 'heading', content: 'Consejos para un transito intestinal regular' },
      { type: 'bullets', content: [
        'La posicion es muy importante. Intenta colocar un banquito al lado del inodoro de manera que tus piernas queden elevadas. Esta es la posicion anatomica que te permitira evacuar tus intestinos con fluidez, sin tener que hacer fuerza y por completo.',
        'Hidratate generosamente a lo largo del dia. Intenta beber abundante agua filtrada o mineral.',
        'MOVIMIENTO diario: el ejercicio fisico es indispensable para una buena salud y el transito intestinal no escapa a esta regla. Cuando te moves favoreces la activacion de los movimientos peristalticos.',
        'Toma un vaso de agua filtrada o mineral tibia, en ayunas, junto a un kiwi o 3 ciruelas (desecadas/pasas).',
        '1 cucharada de aceite de oliva + gotitas de limon antes de las comidas.',
        '1 cucharada de semillas de lino o chia en medio vaso de agua. Dejar remojando toda la noche y consumir la manana siguiente.',
        'Evaluar suplementacion con magnesio.',
        'Reposo digestivo nocturno de 12 horas: intentarlo todos los dias.',
        'Masaje intestinal (ver ejercicio especifico).'
      ]},
      { type: 'quote', content: 'El cuerpo siempre habla. Aprender a escucharlo con compasion, sin juicio, es la base de cualquier proceso de sanacion verdadero.', author: 'Dra. Silvia Losinno' }
    ]
  },
  {
    id: 'rutina_matutina',
    imageUrl: 'https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?w=840&h=240&fit=crop&crop=center',
    imageAlts: [

    icon: '🌅', label: 'Rutina Matutina',
    title: 'Rutina Matutina',
    subtitle: 'Tu inicio: como empezar el dia con intencion y calma',
    sections: [
      { type: 'heading', content: 'La manana: un momento de vulnerabilidad y oportunidad' },
      { type: 'text', content: 'La manana es un momento de mucha vulnerabilidad para nuestro organismo. Viene de un proceso profundo de limpieza y reparacion durante la noche (el cual no somos conscientes) mientras dormimos y cada despertar es una nueva oportunidad de vida y queda en nosotros trabajar para que el primer estimulo de nuestro dia (que va a generar mucho impacto) sea con calma y amabilidad. Ese inicio va a repercutir mucho en lo que va a ser el resto de tu dia.' },
      { type: 'heading', content: 'Los 10 pasos de la rutina matutina' },
      { type: 'bullets', content: [
        '1. Es clave (en lo posible) dejar el telefono en modo avion o lejos de nuestra cama. Ideal no agarrar el celular hasta media hora minimo despues de levantarnos.',
        '2. Cuando te despiertes (ya sea con alarma o sin) te invito a hacer un breve escaneo corporal desde la cama, para registrarNOS. Un buen momento para hacer el MASAJE INTESTINAL (en caso de tener mas tiempo).',
        '3. Levantate de la cama idealmente sobre tu lado izquierdo. Podes estirar un poco el cuerpo (brazos, cuello, espalda etc.) con suavidad, y hacer un par de respiraciones conscientes.',
        '4. Despues de eso abrir las cortinas, mirar hacia afuera unos minutos. Que nuestra retina (ojo) registre luz natural. Si tenes la posibilidad podes salir unos minutos a contemplar.',
        '5. Seguimos por una rutina de higiene bucal. OIL PULLING (ver ejercicio) + cepillado de dientes.',
        '6. Posterior a la limpieza, un buen vaso de agua templada (ni fria, ni caliente).',
        '7. Mindful pooping: ir al bano con atencion plena. Intentar.',
        '8. Tener a mano un cuaderno para escribir todos los dias: 3 cosas por las que estes agradecido, 3 palabras que describan como te levantaste (sensaciones fisicas, mentales, emocionales) y 3 objetivos o actividades para concretar este dia. La escritura se puede dar en cualquier momento del dia. Podes conectar con el flujo de conciencia matutino y escribir directamente lo que salga de vos, sin ponerle mucha mente.',
        '9. Si te animas, podes arrancar con alguna meditacion o con algo de movimiento (ya sea que salgas a caminar o tengas tu horario de entrenamiento) etc. Recomiendo prender el celular lo mas lejos de la rutina matinal posible.',
        '10. (Opcional) tener el cuadernito cerca para anotar o registrar cosas puntuales de tus dias. Escribi pensamientos recurrentes, sentimientos, reflexiones, ideas, creatividad, que elemento fue clave en tu dia, que elemento predomina en mi, en que area de los sentidos hubo foco hoy (escuchar, hablar, mirar, tocar, mover).'
      ]},
      { type: 'quote', content: 'No necesitas 2 horas de rituales. Con 20 minutos bien elegidos podes transformar completamente tu dia.', author: 'Dra. Silvia Losinno' }
    ]

  {
    id: 'elementos',
    imageUrl: 'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=840&h=240&fit=crop&crop=center',
    imageAlts: [
      'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=840&h=240&fit=crop&crop=center',
      'https://images.unsplash.com/photo-1564485377539-4af72d585165?w=840&h=240&fit=crop&crop=center',
      'https://images.unsplash.com/photo-1470116945706-e6bf5d5a53ca?w=840&h=240&fit=crop&crop=center',
    ],
    icon: '🌀', label: 'Elementos de la Naturaleza',
    title: 'Elementos de la Naturaleza',
    subtitle: 'Herramientas sensoriales y corporales para el bienestar integral',
    sections: [
      { type: 'heading', content: 'Los cinco elementos y su expresion en el cuerpo' },
      { type: 'text', content: 'Cada elemento integra nuestro organismo. Todos son parte de todos, pero existen momentos en que los canales de energia vinculados a un elemento especifico pueden estar mas equilibrados y otros un poco mas dispersos, con tendencia a habitarlos de manera mas exagerada o con deficiencia de este.' },
      { type: 'text', content: 'Tener en cuenta estas formas de pensarNOS ayuda a conectar con lo que estamos necesitando de momento a momento, trabajando sobre el elemento que nos ayudaria a potenciar la etapa de nuestra vida que estemos atravesando o en algun momento puntual. Tambien podemos reconocer de donde viene la carencia de alguno para poder estimular justamente eso que nos vendria bien aumentar, o reconocemos que tenemos alguno muy aumentado y necesitamos equilibrar con otros.' },
      { type: 'heading', content: 'ELEMENTO AIRE — Movimiento y pensamiento' },
      { type: 'text', content: 'Se relaciona con lo ligero, pero muy movil y volatil. Podria representarse a traves del viento, el cielo, elementos en estado gaseoso. Es frio, seco, ligero, movil, aspero y claro. Es la fuerza responsable del movimiento, nuestras extremidades se mueven gracias a la fuerza del aire. Se lo relaciona con el sentido del tacto. Las manos estan asociadas a este elemento. En el cuerpo se lo asocia con el movimiento de los impulsos nerviosos, de la respiracion y de las extremidades (caminata ligera. Pies en el aire). A nivel mental es responsable del movimiento de los pensamientos.' },
      { type: 'text', content: 'Movimiento fisico: Control motor y del propio cuerpo. Tecnicas basicas para el desarrollo del core y la estabilidad central. Se usan superficies inestables y deslizantes, entrenamiento en suspension. Se hacen fondos, dominadas, planchas etc. Ejercicios de estabilidad en movimiento. Se asocia a la danza clasica, ballet, house. Deportes conectados al viento (kite, paracaidismo etc).' },
      { type: 'heading', content: 'Elemento aire equilibrado' },
      { type: 'bullets', content: [
        'Nos ayuda a actuar en base a nuestras ideas, pensamientos, creencias.',
        'Nos permite trascender el materialismo y el apego a cosas innecesarias, a sentir la seguridad dentro de nosotros mismos, a primar lo esencial y a ser independientes. A sentirnos libres de las opiniones de los demas y a ser fieles a nosotros mismos.',
        'Creatividad, curiosidad, cambio.',
        'Nos facilita la comunicacion con otros, y la expresion de nuestros pensamientos, ideas, creencias a traves de la palabra, la escritura, etc. Nos da la capacidad para persuadir, convencer, negociar.',
        'Nos ayuda a transgredir lo establecido, a ser originales y fieles a nosotros mismos, a ser justos y a cuestionar las normas.',
        'Nos anima a cambiar en funcion de nuestras ideas. No da miedo el cambio de ideas y mentalidad, al reves, lo ve como parte esencial de la evolucion personal y de la sociedad.',
        'Tambien nos deja sentir compasion y empatia hacia los demas, y actuar por el bien comun, aunque esto vaya en contra de los intereses personales.'
      ]},
      { type: 'heading', content: 'Reflexion sobre el Aire' },
      { type: 'bullets', content: [
        'Describir lo que se te ocurra que venga a tu mente sobre este elemento. Puede ser detalles personales, similitudes con la naturaleza, energia.',
        'Observa tu manera de pisar, ¿necesita ser una pisada mas firme? ¿O necesitas mas liviandad en tu vida? ¿En que aspectos lo consideras?',
        '¿Donde necesitas sacar peso, sacar carga? ¿En que eslabones de tu vida?',
        '¿Como vivis el aire en desequilibrio o con actividad exagerada? ¿Te cuesta hacer foco? ¿Te cuesta concentrarte? ¿Reconoces la "realidad" como tal?',
        '¿Como vivis tus propios pensamientos? ¿Te invaden? ¿Sentis que te pertenecen o logras despersonalizarte de algunos?',
        '¿Te cuesta tomar decisiones firmes?'
      ]},
      { type: 'heading', content: 'ELEMENTO TIERRA — Estructura y fuerza' },
      { type: 'text', content: 'Se relaciona con aquello que es solido, estable, firme y que sostiene, como la tierra misma. Podria representarse a traves de un arbol, de las montanas, las rocas, con cualidades de estabilidad. Otras cualidades: frio, seco, pesado, estatico, aspero y opaco. En el cuerpo humano, esta relacionada con los huesos, cartilagos, unas, musculos, tendones y piel. Se la asocia con el sentido del olfato, la nariz y el ano. Contribuye tambien a la estabilidad de la mente.' },
      { type: 'text', content: 'Movimiento fisico: Todo lo relacionado con el entrenamiento de fuerza. Manejo de cargas (kettlebells, balones medicinales, barras...), sentadillas, press y peso muerto. Ejercicios de FUERZA. Se relaciona tambien a deportes en la montana, a deportes terrenales. En la danza puede estar asociado al afro.' },
      { type: 'heading', content: 'Elemento tierra equilibrado' },
      { type: 'bullets', content: [
        'Nos ayuda a trabajar en nuestros objetivos y a generar abundancia. Nos da la vision sensata y sabia para establecer objetivos, la disciplina y la constancia.',
        'Paciencia, constancia, equilibrio, estabilidad. RAIZ.',
        'Cuidado hacia nuestro entorno, nuestros seres queridos, siendo fiel y responsable en los actos.',
        'Seguridad. Bien plantado. Toma de decisiones sensatas y con facilidad.'
      ]},
      { type: 'heading', content: 'Reflexion sobre la Tierra' },
      { type: 'bullets', content: [
        'Describir lo que se te ocurra que venga a tu mente sobre este elemento. Puede ser detalles personales, similitudes con la naturaleza, energia.',
        '¿Como te llevas con la quietud?',
        '¿Como sos tomando decisiones?',
        '¿Como vivis la paciencia?',
        '¿Que apoyos de tu cuerpo te sostienen?',
        '¿Sentis que perteneces a un grupo? ¿Quienes forman parte de tu TRIBU mas cercana? ¿Tu gente?',
        '¿Tu raiz, donde se conecta?',
        '¿Como seria el elemento tierra en desequilibrio, en exceso? Pensa en tus formas, en tu rutina, en las cosas que no te animaste a hacer. ¿Te sentis estancado?'
      ]},
      { type: 'heading', content: 'ELEMENTO AGUA — Fluidez y emociones' },
      { type: 'text', content: 'Se relaciona con aquello que es conductor y adaptable. Podria representarse a traves de un rio, el mar o la lluvia. Es fria, humeda, pesada, movil, suave y opaca. En nuestro cuerpo la proporcion de agua es del 70%. Este elemento lo encontramos en forma grasa, fluidos corporales, linfa, sangre, entre otros. Se le relaciona con el sentido del gusto, la lengua y los genitales. Se le atribuye tambien emociones amables, carinosas y compasivas.' },
      { type: 'text', content: 'Movimiento fisico: En el agua se tratan todas las tecnicas que sirven para compensar los eslabones debiles y desajustes propios del cuerpo durante la vida diaria. Tambien se desarrollan rutinas de flexibilidad por cadenas musculares, reequilibrio de los nucleos articulares que suelen lesionarse con mayor frecuencia (hombro, muneca, rodillas, tobillos y columna), liberacion miofascial. Deportes acuaticos (surf, natacion, kite, windsurf) y deportes de nieve (snowboard, ski).' },
      { type: 'heading', content: 'Elemento agua equilibrado' },
      { type: 'bullets', content: [
        'Nos ayuda a trabajar nuestra conexion con lo que sentimos, entendernos a nosotros mismos y a los demas, a traves de nuestra empatia e instinto. Nos da la capacidad para adaptarnos a lo que nos sucede y transformarnos internamente para evolucionar y sobrevivir.',
        'Calma, fluidez, flexibilidad. Caminata mas pesada. Lenta (pero combinada con aire puede ser rapida).',
        'Obtiene satisfaccion a traves de la conexion emocional con los demas, necesita establecer relaciones muy profundas y pasionales.',
        'Cuida de los suyos desde el amor y lo emocional, los comprende, los escucha y se preocupa por ellos ayudandolos en lo que necesitan. Entienden los problemas de sus seres queridos y hacen lo necesario para ayudar con posibles soluciones.',
        'Siente seguridad al establecer relaciones profundas y reciprocas.'
      ]},
      { type: 'heading', content: 'Reflexion sobre el Agua' },
      { type: 'bullets', content: [
        'Describir lo que se te ocurra que venga a tu mente sobre este elemento. Pueden ser detalles personales, similitudes con la naturaleza, energia.',
        '¿En que momentos sentis que fluis con las situaciones de tu vida?',
        'Densidad: ¿Tu cuerpo, en que estacion del ano habita la comodidad?',
        '¿Que siente tu cuerpo cuando nada?',
        '¿Que sensaciones te da escuchar el ruido de agua?',
        '¿Te hidratas bien?',
        '¿Como sentis tu circulacion? ¿Se te hincha alguna parte del cuerpo? ¿Necesitas ponerte en contacto con el para darle soporte? Observa los ejercicios que te podrian ayudar.'
      ]},
      { type: 'heading', content: 'ELEMENTO FUEGO — Digestion y motivacion' },
      { type: 'text', content: 'Se relaciona con lo que es ardiente, apasionado, agresivo, pero al mismo tiempo, purifica, impulsa, cautiva. Podria representarse a traves de las llamas del fuego, el rayo y su poder (descontrolado, provoca llamas y destruccion; controlado, da lugar a la electricidad y al avance, al progreso). Es caliente, seco, ligero, movil y aspero. Se le asocia con el calor, la luz y facilita la transformacion. A nivel fisiologico, el fuego es responsable de la digestion. Se le vincula con el sentido de la vista y con los pies. El fuego tambien es la energia que nos permite avanzar. Nuestra motivacion y estimulo por movernos hacia adelante dependera de la fuerza del fuego en nuestro organismo. Al fuego se le relaciona con la percepcion.' },
      { type: 'text', content: 'Movimiento fisico: Trabajo cardiovascular, adaptado en todo momento a las necesidades propias de cada persona. Tambien rutinas de calentamiento dinamico o HIIT (high intensity interval training). Ejercicios de velocidad, pasadas, carreras.' },
      { type: 'heading', content: 'Elemento fuego equilibrado' },
      { type: 'bullets', content: [
        'Nos ayuda a conectar con la pasion, el amor, la felicidad y el optimismo.',
        'Representa la satisfaccion, la sinceridad.',
        'Voluntad, energia, iniciativa.',
        'Conecta con nuestro ingenio y creatividad, la capacidad para aprovechar las oportunidades y hacer lo que sea necesario: la accion, el movimiento.',
        'La capacidad de combatir, liderar y estar seguro de uno mismo.'
      ]},
      { type: 'heading', content: 'Reflexion sobre el Fuego' },
      { type: 'bullets', content: [
        'Describir lo que se te ocurra que venga a tu mente sobre este elemento. Puede ser detalles personales, similitudes con la naturaleza, energia. El fuego como fuente de vida, crecimiento, expansion o el fuego destructivo, el que arrasa con todo. El elemento fuego es el generador de energia en el cuerpo, asi como el sol es el generador de energia de la tierra.',
        '¿Que te mueve? ¿Que te impulsa?',
        '¿Consideras que la exigencia con vos misma/o es parte de lo cotidiano? ¿En que areas de tu vida?',
        '¿Que sensaciones te da el fuego?',
        '¿Como son tus digestiones? ¿Tenes algun sintoma digestivo?',
        '¿Que te genera el sol en la cara? ¿Soles tener espacios de conexion con el?'
      ]},
      { type: 'heading', content: 'ETER — Espacio y expresion personal' },
      { type: 'text', content: 'El mas sutil de los elementos: "espacio". Es el espacio que los demas elementos rellenan. Un todo. Es el mas expansivo de los elementos. Sin forma ni fronteras, el eter no tiene limites. En el cuerpo, el eter se expresa dentro de los espacios vacios. Es el lugar de nuestra expresion personal. El eter es nada y todo al mismo tiempo. Es la quietud. Pero es, precisamente, lo que hace posible todo movimiento y vida. Es la forma mas sutil en que se manifiesta la materia y es imperceptible a los sentidos.' },
      { type: 'bullets', content: [
        'Cualidad: espacio, quietud, sonido, expresion personal.',
        'En el cuerpo: cavidades (boca, oidos, senos paranasales), garganta.',
        'Ejercicio: silencio consciente — 10 minutos sin pantallas, sin musica, sin hablar. Solo observar.',
        'Tambien: cantar, tararear, leer en voz alta — vibrar la voz tiene efecto calmante sobre el sistema nervioso.'
      ]}
    ]
  },
  {

    icon: '💉', label: 'Alimentación con Ozempic',
    title: 'Alimentación con Ozempic',
    subtitle: 'Cómo proteger tu músculo y aprovechar al máximo el tratamiento',
    sections: [
      { type: 'heading', content: '¿Por qué prestar atención a la proteína?' },
      { type: 'text', content: 'La dosis plena de Ozempic (1 mg) baja el apetito, y eso ayuda al proceso. Pero también puede hacer que sin querer estés comiendo menos proteína de la que necesitás. Y ahí es donde tenemos que prestar atención: no queremos que el cuerpo pierda músculo junto con la grasa.' },
      { type: 'text', content: 'Por eso es fundamental que todos los días haya proteína suficiente.' },
      { type: 'heading', content: 'Recordatorio simple' },
      { type: 'bullets', content: [
        'Que tu desayuno tenga huevos o un yogur griego completo.',
        'Que en el almuerzo haya una porción clara y generosa de pollo, carne o pescado (que sea lo principal del plato).',
        'Que a la tarde sumes un refuerzo proteico (yogur griego, queso magro, atún o huevos).',
        'Que en la cena vuelva a haber proteína real, no solo verduras.'

      { type: 'text', content: 'Si un día tenés poco apetito, priorizá primero la proteína y después lo demás. Eso es lo que protege tu músculo, tu fuerza y tu metabolismo mientras bajás de peso.' },
      { type: 'heading', content: 'Regla simple del día: 3 porciones grandes + 1 refuerzo proteico' },
      { type: 'heading', content: '1) Desayuno — 20 a 30 g de proteína' },

// ── USO DE TEMAS (persistencia en localStorage) ────────────────────────────────
const USAGE_KEY = 'losinno_topic_usage';
function loadUsage() {
  try { return JSON.parse(localStorage.getItem(USAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveUsage(u) { try { localStorage.setItem(USAGE_KEY, JSON.stringify(u)); } catch(e) {} }
function incrementUsage(ids) {
  const u = loadUsage();
  ids.forEach(id => { u[id] = (u[id] || 0) + 1; });
  saveUsage(u);
}
function getUsage(id) { return loadUsage()[id] || 0; }

// ── ORDENAMIENTO Y BÚSQUEDA ────────────────────────────────────────────────────
let sortMode = 'usos'; // 'usos' | 'az'
let searchQuery = '';

function setSortMode(mode) {
  sortMode = mode;
  document.getElementById('sortUsos').classList.toggle('active', mode === 'usos');
  document.getElementById('sortAz').classList.toggle('active', mode === 'az');
  renderTopicGrid();
}

function filterTopics(q) {
  searchQuery = q.toLowerCase().trim();
  renderTopicGrid();
}

function sortedTopics() {
  const usage = loadUsage();
  let list = [...TOPICS];
  if (sortMode === 'usos') {
    list.sort((a, b) => {
      const diff = (usage[b.id] || 0) - (usage[a.id] || 0);
      if (diff !== 0) return diff;
      return a.label.localeCompare(b.label, 'es');
    });
  } else {
    list.sort((a, b) => a.label.localeCompare(b.label, 'es'));
  }
  return list;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderMaterial(data) {
  // Header
  document.getElementById('headerNombre').textContent = data.paciente || '';
  const fecha = data.creado
    ? new Date(data.creado + 'T00:00:00').toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' })
    : '';
  document.getElementById('headerFecha').textContent = fecha ? `Generado el ${fecha}` : '';

  // Temas
  const container = document.getElementById('temasContainer');
  const allTopics = [...TOPICS, ...MID_BANNERS];
  let bannerCount = 0;

  data.orden.forEach((id, idx) => {
    const topic = allTopics.find(t => t.id === id);
    if (!topic) return;

    // Banner intermedio
    if (topic.id.startsWith('mid_banner')) {
      const imgUrl = (data.fotos && data.fotos[id]) || topic.imageAlts[0];
      const div = document.createElement('div');
      div.className = 'mid-banner';
      div.innerHTML = `<img src="${imgUrl}" alt="imagen decorativa" loading="lazy">`;
      container.appendChild(div);
      return;
    }

    // Tema normal
    const imgUrl = (data.fotos && data.fotos[id]) || topic.imageAlts[0];
    const div = document.createElement('div');
    div.className = 'tema';

    let sectionsHtml = '';
    (topic.sections || []).forEach(s => {
      if (s.type === 'heading') {
        sectionsHtml += `<div class="tema-heading">${s.content}</div>`;
      } else if (s.type === 'text') {
        sectionsHtml += `<p class="tema-text">${s.content}</p>`;
      } else if (s.type === 'bullets') {
        sectionsHtml += `<ul class="tema-bullets">${s.content.map(b => `<li>${b}</li>`).join('')}</ul>`;
      }
    });

    div.innerHTML = `
      <img class="tema-img" src="${imgUrl}" alt="${topic.title}" loading="lazy">
      <div class="tema-body">
        <div class="tema-title">${topic.title}</div>
        ${topic.subtitle ? `<div class="tema-subtitle">${topic.subtitle}</div>` : ''}
        ${sectionsHtml}
      </div>`;
    container.appendChild(div);
  });

  // Mostrar contenido
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'flex';
  if (msg) document.getElementById('errorMsg').textContent = msg;
}

// ── CARGAR DATOS ──────────────────────────────────────────────────────────────
const MAX_RETRIES = 10;
const RETRY_INTERVAL = 8000; // 8 segundos entre intentos

async function fetchMaterial(url, attempt) {
  const res = await fetch(url + '?t=' + Date.now());
  if (!res.ok) throw new Error('not_found');
  return res.json();
}

async function init() {
  const parts = window.location.pathname.split('/');
  const id = parts[parts.length - 1] || parts[parts.length - 2];

  if (!id || id === 'index.html') {
    showError('No se especificó ningún material. El link puede estar incompleto.');
    return;
  }

  const url = `https://raw.githubusercontent.com/enohcaid/losinno-material-educativo/refs/heads/gh-pages/m/${id}.json`;

  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    try {
      const data = await fetchMaterial(url, attempt);
      renderMaterial(data);
      return;
    } catch(e) {
      if (e.message !== 'not_found') {
        // Error de red — mostrar mensaje
        showError('No se pudo cargar el material. Revisá tu conexión e intentá de nuevo.');
        return;
      }
      if (attempt < MAX_RETRIES) {
        // Todavía no propagó — mostrar mensaje amigable y reintentar
        const remaining = MAX_RETRIES - attempt;
        document.querySelector('.loading-text').textContent =
          `Preparando tu material, un momento${'.'.repeat(attempt % 4)}`;
        await new Promise(r => setTimeout(r, RETRY_INTERVAL));
      } else {
        showError('Tu material todavía se está procesando. Esperá unos minutos y volvé a abrir el link.');
      }
    }
  }
}

init();
</script>
