<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Material Educativo · Losinno</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal: #1e6e6e;
      --teal-light: #a2d0d0;
      --gold: #c9a66b;
      --cream: #f7f3ec;
      --dark: #2c2c2c;
      --mid: #6b6b6b;
      --white: #ffffff;
      --border: #e8e0d4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: var(--cream);
      color: var(--dark);
      min-height: 100vh;
    }

    /* ── LOADING ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 20px;
      padding: 40px;
    }
    .loading-logo { width: 200px; opacity: 0.85; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--teal-light);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 15px; color: #888; }

    /* ── ERROR ── */
    #error {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
      padding: 40px;
      text-align: center;
    }
    .error-icon { font-size: 48px; }
    .error-title { font-size: 22px; font-weight: 700; color: var(--teal); }
    .error-msg { font-size: 15px; color: #888; max-width: 340px; line-height: 1.6; }

    /* ── CONTENIDO ── */
    #content { display: none; max-width: 680px; margin: 0 auto; padding: 0; }

    /* Header — imagen banner a ancho completo */
    .page-header {
      position: relative;
      background: var(--cream);
    }
    .header-banner {
      width: 100%;
      display: block;
    }
    .header-info {
      padding: 14px 24px 18px;
      text-align: center;
      background: var(--cream);
    }
    .header-paciente {
      font-size: 11px;
      color: var(--mid);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 2px;
    }
    .header-nombre {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--dark);
      line-height: 1.3;
    }
    .header-fecha {
      font-size: 11px;
      color: var(--mid);
      margin-top: 4px;
    }

    /* Temas — fondo crema como el PDF */
    .tema {
      background: var(--cream);
      margin: 0;
      overflow: hidden;
    }
    .tema-img-wrap {
      position: relative;
      width: 100%;
      height: 180px;
      overflow: hidden;
    }
    .tema-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .tema-img-wrap::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: linear-gradient(to top, rgba(0,0,0,0.35), transparent);
    }
    .tema-body { padding: 20px 24px 28px; }
    .tema-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      color: var(--dark);
      margin-bottom: 4px;
      line-height: 1.3;
    }
    .tema-subtitle {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      color: var(--teal);
      font-style: italic;
      letter-spacing: 0.02em;
      margin-bottom: 12px;
    }
    .tema-separator {
      border: none;
      height: 1px;
      background: var(--gold);
      margin: 0 0 16px;
    }
    .tema-heading {
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dark);
      margin: 18px 0 8px;
      padding-bottom: 5px;
      padding-left: 14px;
      position: relative;
      border-bottom: 1.5px solid var(--teal-light);
    }
    .tema-heading::before {
      content: '';
      position: absolute;
      left: 0;
      top: 4px;
      width: 7px;
      height: 7px;
      background: var(--teal);
      border-radius: 50%;
    }
    .tema-heading:first-child { margin-top: 0; }
    .tema-text {
      font-size: 13.5px;
      line-height: 1.75;
      color: var(--dark);
      margin-bottom: 8px;
    }
    .tema-bullets { list-style: none; margin: 0; padding: 0; }
    .tema-bullets li {
      font-size: 13.5px;
      line-height: 1.65;
      color: var(--dark);
      padding: 4px 0 4px 18px;
      position: relative;
      border-bottom: 1px solid var(--border);
    }
    .tema-bullets li:last-child { border-bottom: none; }
    .tema-bullets li::before {
      content: '';
      position: absolute;
      left: 4px;
      top: 11px;
      width: 6px;
      height: 6px;
      background: var(--teal);
      border-radius: 50%;
    }

    /* Quote — fiel al PDF: fondo cálido, borde dorado, Playfair itálica */
    .tema-quote {
      margin: 14px 0 10px;
      padding: 14px 18px;
      background: #fdf5e8;
      border-left: 3px solid var(--gold);
      border-radius: 0;
    }
    .tema-quote p {
      font-family: 'Playfair Display', serif;
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--dark);
      font-style: italic;
      margin: 0;
    }
    .tema-quote cite {
      display: block;
      font-family: 'Lato', sans-serif;
      font-size: 12px;
      color: var(--teal);
      font-weight: 700;
      font-style: normal;
      margin-top: 8px;
    }

    /* Banner intermedio — decorativo entre temas */
    .mid-banner {
      margin: 0;
      overflow: hidden;
      height: 130px;
      position: relative;
    }
    .mid-banner img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .mid-banner::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 36px;
      background: linear-gradient(to top, rgba(0,0,0,0.22), transparent);
    }

    /* Separador de encabezado repetido entre temas */
    .section-header-repeat {
      width: 100%;
      display: block;
    }

    /* Social media box */
    .social-box {
      margin: 28px 24px 0;
      padding: 18px 16px;
      border: 1.5px solid var(--teal);
      border-radius: 8px;
      text-align: center;
    }
    .social-box-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--teal);
      margin-bottom: 14px;
    }
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 32px;
      margin-bottom: 14px;
    }
    .social-icon-item { text-align: center; }
    .social-icon-circle {
      width: 34px; height: 34px;
      background: var(--teal);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 4px;
    }
    .social-icon-circle svg { width: 16px; height: 16px; fill: white; }
    .social-icon-label {
      font-size: 10px;
      color: var(--teal);
    }
    .social-disclaimer {
      font-size: 10px;
      color: var(--mid);
      margin-top: 8px;
      line-height: 1.5;
    }

    /* Footer — imagen banner a ancho completo */
    .page-footer {
      margin: 28px 0 0;
      text-align: center;
    }
    .footer-banner {
      width: 100%;
      display: block;
    }
    .footer-text {
      font-size: 11px;
      color: var(--mid);
      margin-top: 0;
      padding: 8px 16px;
      line-height: 1.5;
    }

    /* ── RESPONSIVE ── */
    @media (min-width: 600px) {
      .mid-banner { height: 160px; }
      .tema-img-wrap { height: 220px; }
      .tema-body { padding: 24px 32px 32px; }
      .header-info { padding: 16px 32px 20px; }
    }
  </style>
</head>

    subtitle: 'Como lograr una digestión saludable, rápida y sin inflamación',
    sections: [
      { type: 'heading', content: 'El objetivo' },
      { type: 'text', content: 'Lograr una digestión saludable, rápida, en la que los alimentos no permanezcan en el estómago más tiempo del debido. De lo contrario se inician procesos de fermentación y putrefacción que resultan en inflamación abdominal. Posibles síntomas: dolor, gases, acidez, reflujo, alteraciones en el tránsito intestinal. Si esto no es modificado a tiempo pueden llegar a producir, por citar solo un par de ejemplos, gastritis o colon irritable.' },

      { type: 'heading', content: '1) Disociación Bioquimica de alimentos' },
      { type: 'text', content: 'Alimentos ricos en Hidratos de Carbono: cereales (arroz, quinoa, mijo, maiz, etc.), papa, batata, mandioca, choclo, pan, galletitas, pastas, legumbres.' },
      { type: 'text', content: 'Alimentos ricos en proteínas: carnes de cualquier animal (vaca, pollo, pescado, cordero, etc.).' },
      { type: 'text', content: 'NO se deben mezclar alimentos ricos en hidratos con alimentos ricos en proteínas.' },
      { type: 'heading', content: 'Malas combinaciones habituales' },
      { type: 'bullets', content: [
        'Carnes con papa (en cualquiera de sus formas: pure / al horno / fritas).',
        'Arroz con pollo.',
        'Fideos con salsa bolonesa o con estofado.'
      ]},
      { type: 'heading', content: 'Cereales y legumbres' },
      { type: 'text', content: 'Tampoco es recomendable combinar cereales con legumbres. El maximo de tolerancia en este caso es la regla 80/20: 80% de cereales con 20% de legumbres y viceversa.' },
      { type: 'heading', content: 'Lo que SI se puede mezclar' },
      { type: 'bullets', content: [
        'Hidratos de carbono o legumbres con huevo (ej.: ensalada de arroz con huevos).',
        'Proteinas (carnes) con hojas verdes y vegetales sin almidon.'
      ]},
      { type: 'heading', content: 'Otras incompatibilidades importantes' },
      { type: 'bullets', content: [
        'Los alimentos muy dulces son incompatibles con los alimentos grasos. Ejemplo: pan con manteca y mermelada.',

        'No son compatibles frutas almidonaceas, como la banana, con frutas acidas.',
        'Bananas, melon y sandia: preferible consumirlas siempre individualmente.'

      { type: 'heading', content: '2) Compatibilidades electromagneticas — En caso de malestar gastrointestinal' },
      { type: 'text', content: 'Somos seres eléctricos, así tal como suena, y lo mismo sucede con los alimentos. Para no entorpecer "bio-electricamente" el proceso digestivo, es bueno tener en cuenta la siguiente información.' },
      { type: 'heading', content: 'ELECTROPOSITIVOS (semillas o carozo con pulpa)' },
      { type: 'bullets', content: [
        'Tomate, pepino, morron (rojo/amarillo), zuccini, zapallito redondo, calabaza, berenjena, chaucha, choclo, aceitunas negras, palta.',
        'Todas las frutas.'
      ]},
      { type: 'heading', content: 'NEUTROS (semillas con cascara)' },
      { type: 'bullets', content: [
        'Frutos secos.',
        'Legumbres.',
        'Cereales.',
        'Semillas: chia, sésamo, girasol, huevo.'
      ]},
      { type: 'heading', content: 'ELECTRONEGATIVOS (sin ningun tipo de semilla)' },
      { type: 'bullets', content: [
        'Hojas.',
        'Tallos: apio, esparragos, brotes.',
        'Flores: repollo, brocoli, coliflor, alcaucil.',
        'Bulbos o raices: papa, batata, mandioca, zanahoria, remolacha, cebolla, rabanito, hinojo.',
        'Carnes preferentemente con hojas verdes.'
      ]},
      { type: 'text', content: 'Preferentemente no combinar en un mismo plato de almuerzo o cena alimentos de carga positiva con alimentos de carga negativa. Máximo de tolerancia en la combinación: 80% de uno de los dos con 20% del otro.' },
      { type: 'text', content: 'Ejemplo: una ensalada podria tener tomate, palta, pepino, chauchas (todos electropositivos: con semilla o carozo) combinando apenas con un punado de rucula (electronegativo: sin semillas ni carozo). O viceversa, una ensalada de hojas verdes, zanahoria, repollo (todos sin semilla: electronegativos) con apenas medio tomate.' },
      { type: 'text', content: 'Esto es especialmente importante en casos de inflamación intestinal.' },

      { type: 'heading', content: '3) Frutas' },
      { type: 'text', content: 'Las frutas necesitan muy poco trabajo digestivo, y además este se lleva a cabo en el intestino y no en el estómago. Por esto deben consumirse alejadas de las comidas: hasta una hora antes de almuerzo o cena, y recien dos horas despues de finalizadas las mismas.' },
      { type: 'text', content: 'De lo contrario, si las comes próximas a la comida, las obligas a permanecer más de lo debido en el estómago, y dada su alta concentración de azucar van a entrar en fermentación, ellas y el resto de los alimentos de esa comida. Se inicia así un proceso de inflamación.' },
      { type: 'bullets', content: [
        'No es conveniente mezclar más de 2 o 3 variedades de fruta.',

      ]},

      { type: 'heading', content: '4) Liquidos' },

      { type: 'text', content: 'De no lograr evitar beber liquido durante la comida, la sugerencia es que sea en poca cantidad y que este a temperatura ambiente. Lo ideal seria el agua, las limonadas sin azucar o las infusiones.' }

      { type: 'bullets', content: ['1-1.5 kg de huesos de vaca (preferentemente con tuétano y articulaciones).','Opcional: carcasa de pollo de campo o patas de pollo.','2 zanahorias, 2 ramas de apio, 1 cebolla entera, 4 dientes de ajo.','1 puerro, 1 trozo de jengibre, 1 trozo de alga kombu.','2 cucharadas de vinagre de manzana orgánico (fundamental: extrae los minerales del hueso).','Sal marina, pimienta, laurel, orégano, perejil.'] },
      { type: 'heading', content: 'Preparación' },
      { type: 'bullets', content: ['Paso 1: Blanquear los huesos — cubrir con agua fría, llevar a hervor 5 min y tirar el agua (elimina impurezas).','Paso 2: Asar los huesos en horno 200° por 30 min (intensifica el sabor).','Paso 3: Colocar todo en olla grande (o olla a presión) con agua fría que cubra bien.','Paso 4: Agregar el vinagre de manzana y dejar reposar 30 min antes de encender el fuego.','Paso 5: Llevar a hervor suave, espumar bien los primeros 30 min, luego tapar y cocinar.'] },
      { type: 'heading', content: 'Tiempo de cocción' },
      { type: 'bullets', content: ['Olla convencional: 12 a 24 horas a fuego muy bajo (cuanto más, mejor).','Olla a presión: 3 a 4 horas.','El caldo está listo cuando los huesos se deshacen y el líquido tiene cuerpo.'] },
      { type: 'heading', content: 'Conservación y uso' },
      { type: 'bullets', content: ['Colar y dejar enfriar. Al enfriarse debe solidificarse (señal de calidad).','Heladera: hasta 5 días. Freezer: hasta 3 meses en porciones.','Tomar 1-2 tazas por día como consomé, o usar como base para sopas y guisos.','Agregar levadura nutricional, cúrcuma o limón al momento de servir.'] },
      { type: 'quote', content: 'El caldo de huesos es uno de los alimentos más reparadores que existen. No hay suplemento de colágeno que lo supere.', author: 'Dra. Silvia Losinno' }
    ]
  },

      { type: 'heading', content: 'Leche de almendras (base)' },
      { type: 'bullets', content: ['Activar 1 taza de almendras (remojo 8-12 hs). Pelar si se desea.','Licuar con 3-4 tazas de agua filtrada hasta obtener una mezcla homogénea.','Colar con bolsa de leche vegetal o tela. Exprimir bien.','Guardar en frasco de vidrio en heladera hasta 3-4 días.','Endulzar con dátiles, stevia o miel + esencia de vainilla si se desea.'] },
      { type: 'heading', content: 'Leche de coco' },
      { type: 'bullets', content: ['Licuar 1 taza de coco rallado sin azúcar con 2-3 tazas de agua caliente.','Colar bien. Más espesa: menos agua. Más liviana: más agua.','Ideal para preparaciones calientes, curries y postres.'] },
      { type: 'heading', content: 'Leche de quínoa o avena sin gluten' },
      { type: 'bullets', content: ['Cocinar ½ taza del cereal hasta que esté muy blando.','Licuar con 3 tazas de agua, colar y refrigerar.','La avena da una textura cremosa ideal para el desayuno.'] },
      { type: 'heading', content: 'Yogur de almendras' },
      { type: 'bullets', content: ['Preparar leche de almendras espesa (relación 1:2 almendra:agua).','Agregar 2 cápsulas de probióticos o 2 cucharadas de yogur natural como cultivo iniciador.','Cubrir con tela y dejar fermentar 8-12 horas a temperatura ambiente.','Refrigerar y consumir dentro de los 5 días.','Acompañar con frutos rojos, semillas y miel.'] },
      { type: 'heading', content: 'Queso de almendras o cajú' },
      { type: 'bullets', content: ['Activar 2 tazas de almendras o cajú (remojo 8 hs).','Procesar con limón, ajo, sal, levadura nutricional y agua (cantidad necesaria) hasta obtener textura cremosa.','Rawmesan: procesar almendras o cajú con levadura nutricional + sal, hasta obtener textura granulada como parmesano.','Usar sobre pastas, ensaladas, sopas.'] },
      { type: 'quote', content: 'Los fermentados son probióticos naturales que alimentan la microbiota intestinal. Un intestino sano es la base de un sistema inmune fuerte.', author: 'Dra. Silvia Losinno' }
    ]

  {
    id: 'mindfulness',
    imageUrl: 'https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=840&h=240&fit=crop&crop=center',
    imageAlts: [
      'https://images.unsplash.com/photo-1506126613408-eca07ce68773?w=840&h=240&fit=crop&crop=center',
      'https://images.unsplash.com/photo-1499209974431-9dddcece7f88?w=840&h=240&fit=crop&crop=center',
      'https://images.unsplash.com/photo-1545205597-3d9d02c29597?w=840&h=240&fit=crop&crop=center',
    ],
    icon: '🧘', label: 'Mindful Eating y Autocuidado',
    title: 'Mindful Eating y Autocuidado',
    subtitle: 'Herramientas para una relación consciente con tu alimentación',
    sections: [
      { type: 'heading', content: 'Antes de empezar a comer' },
      { type: 'text', content: 'Crear el espacio y el tiempo para comer con presencia y consciencia, dejando los estímulos externos y los juicios internos de lado, dedicandote un momento para vos, para nutrirte y hacer del acto del comer lo más sagrado que se pueda. No tiene que ser perfecto ni un ideal, solo ayudarte a dar varios pasos para conectarte más aun con tu presente y tu cuerpo. La comida puede ser un puente entre como te sentis y como te queres sentir.' },
      { type: 'bullets', content: [
        'Tratar de observar las emociones. Registrar el hambre. ¿Es hambre o necesito algo que me reconforte?',
        'Generar un espacio para comer sin television o celular para poder registrar y ser consciente del acto. Aunque sea poco tiempo, dale la importancia que se merece.',
        'Cocinar a partir de alimentos reales, alimentos que nos nutran.',
        'Involucrar los sentidos y tratar de estar comodos, sentados, erguidos para una buena postura de digestión.',
        'Podes poner musica que relaje o prender alguna vela para generar un momento lindo para vos o para compartir.',
        'Chequear tus niveles de hambre al crear tu plato completo. Con ingredientes de calidad.',
        'Arma un plato lindo, agradable, colorido y con una porcion logica que crees que necesitas.',
        'Toma un vaso de agua.',
        'Cerra los ojos y hace tres respiraciones profundas: Inhalo el aire en 4 tiempos, retengo en 7 tiempos y exhalo en 8 tiempos.',
        'Observa tus pensamientos y emociones.',
        'Mirar el alimento, olerlo, tocarlo (si se puede), saborearlo, morderlo.',
        'Masticar: sentir el sabor y sensación. Trata de masticar tranquila cada bocado. Podes apoyar los cubiertos entre bocado y bocado.',
        'Trata de tomar agua cuando la necesites, pero no en mucha cantidad durante las comidas. Es mejor hidratarte bien antes y despues de las comidas principales.',
        'Disfrutar del acto, de lo que elijo. Agradecer.'
      ]},
      { type: 'heading', content: 'Escala del hambre' },
      { type: 'text', content: 'La escala del hambre es una herramienta práctica para volver a conectar con las señales que el organismo tiene naturalmente para autorregularse. Es importante entender que estas señales estaran cada vez más "limpias" y en equilibrio en la medida en que nuestra alimentación sea cada vez más consciente y de calidad. El hambre no es lineal. Especialmente en las mujeres, puede ser muy cíclico ya que fisiológicamente somos más cíclicas que los hombres. Este tipo de herramientas son un soporte para volver a confiar en las señales que el cuerpo manifiesta de momento a momento.' },
      { type: 'bullets', content: [
        '1 — Hambre extrema: de mal humor, acidez, comerias cualquier cosa con una carga de ansiedad. Irritable.',
        '2 — Mucha hambre: sensación de estómago vacio, ruidos, dolor. Comer lo que sea rápido.',
        '3 — Hambre (IDEAL para iniciar): nivel ideal para pensar en iniciar una comida. Con posibilidad de eleccion, elaboracion y momento para Mindful Eating.',
        '4 — Poca hambre: empiezo a sentir satisfacción mientras como. Disfruto las sensaciones.',
        '5 — Neutral: empiezo a sentir saciedad. Ya no tengo hambre, pero tampoco estoy con una sensación de plenitud excesiva.',
        '6 — Casi llena: satisfecho. Ya no se empieza a ir el hambre por completo. Empezamos a disminuir el ritmo o dejamos de comer.',
        '7 — Llena y satisfecha (IDEAL para finalizar): sensación neutra entre comodidad e incomodidad. Si sigo posiblemente comience a estar más incomodo.',
        '8 — Muy llena: sensación incomoda de saciedad.',
        '9 — Muy llena o incomoda: plenitud. Cansancio. Necesito acostarme. Muy distendida.',
        '10 — Saturada: dolor de estómago. Sensacion de explotar. Acidez, nauseas. Dificultad para respirar.'
      ]},
      { type: 'text', content: 'IDEAL: comenzar con un 3 y finalizar con un 7. Es un ejercicio de observación más consciente. Comer con atención plena nos permite conectarnos con esta herramienta y al comer más pausado, podemos identificar y lograr un proceso gradual en escala. Si este ejercicio pasa a ser un estresor o alarma nueva para tu cuerpo, no la sigas usando.' },
      { type: 'heading', content: 'Contextualizar tu hambre' },
      { type: 'bullets', content: [
        '¿A que horarios de cada dia me suele aparecer mucha hambre?',
        '¿Como varia esto segun la estacion del año, momento del ciclo, mi nivel de estres, mi comida previa?',
        '¿Que dias o en que momentos suelo sentir más hambre en base a mi ciclo? ¿Como me manejo en esas situaciones?',
        '¿Que puedo dejar preparado y a mano?',
        '¿Que actitud al comer puedo tomar antes o durante la comida para evitar llegar al nivel 10?',
        '¿Que actitud me hara bien tener conmigo misma si es que llego al nivel 10?'
      ]},
      { type: 'quote', content: 'Es información para observar, reflexionar, pero no para juzgar.', author: 'Dra. Silvia Losinno' },
      { type: 'heading', content: 'Ejercicio de la pasa de uva — Mindful Eating' },
      { type: 'text', content: 'Podes hacer este ejercicio con alguien que te guie.' },
      { type: 'bullets', content: [
        '1. Sentarnos en una silla. Que los pies toquen el piso en lo posible. Sentir los apoyos que sostienen a tu cuerpo.',
        '2. Agarrar una pasa de uva y sostenerla con la palma de la mano o con los dedos. Mantener la concentración en la pasa como si fuera la primera vez. ¿Que peso tiene? ¿La noto en la mano? ¿Proyecta una sombra sobre la palma de la mano?',
        '3. VER: tomar un poco de tiempo para ver realmente la pasa imaginando que nunca miraste una tan detalladamente. Observarla con toda la atención, dejando que los ojos exploren los puntos de luz, los agujeros oscuros, los pliegos, los contrastes de colores.',
        '4. TOCAR: mover la pasa entre los dedos explorando su textura. Apretarla.',
        '5. OLER: acercar la pasa a la nariz y percibir las sensaciones con cada inspiración. ¿Tiene algun tipo de olor?',
        '6. COLOCAR: acercar la pasa adentro de la boca de manera lenta. Fijaremos como la mano y el brazo saben exactamente donde colocar la pasa. Sin masticarla, exploraremos las sensaciones que nos aporta a la lengua.',
        '7. MASTICAR: morder conscientemente y percibir los efectos de la fruta en la boca, centrandonos en los sabores. Prestar atención a la textura, sin tragar.',
        '8. TRAGAR: observar si somos capaces de detectar la primera intención de tragarse la pasa. Apreciar los movimientos de preparacion que hacemos con la lengua.',
        '9. Tener en cuenta que la pasa va pasar por el esófago y luego al estómago, donde predomina nuestro fuego digestivo para empezar la digestión más potente.',
        '10. Efectos posteriores: ¿persiste su sabor en la boca? ¿Que sensaciones se tienen en no tenerla? ¿Existe un impulso para comerte otra pasa?'
      ]},
      { type: 'heading', content: 'Mindful Pooping — defecar con atención plena' },
      { type: 'text', content: 'Nuestra digestión comienza a traves de los sentidos y finaliza cuando la materia fecal ingresa al inodoro. Cuando tengas ganas de defecar, si te es posible, hacelo. No te inhibas. No actues en contra de lo que te pide el cuerpo: es fisiología pura. Ademas, las heces se deshidratan y cuando quieras sacarlas para afuera, te va a costar más. Mucha gente no sabe que la inmensa mayoria de los occidentales defecamos MAL. El ser humano tiene una anatomía que nos pide defecar en cuclillas. En cuclillas se relaja y las heces salen con mayor facilidad, por eso colocar un banquito específico o elevar un poco las rodillas con algun objeto puede favorecer. Intenta no llevar el celular así aprovechas ese momento intimo con vos mismo: se liberan endorfinas al hacer una deposición.' },
      { type: 'heading', content: 'Consejos para un tránsito intestinal regular' },
      { type: 'bullets', content: [
        'La posición es muy importante. Intenta colocar un banquito al lado del inodoro de manera que tus piernas queden elevadas. Esta es la posición anatomica que te permitira evacuar tus intestinos con fluidez, sin tener que hacer fuerza y por completo.',
        'Hidratate generosamente a lo largo del dia. Intenta beber abundante agua filtrada o mineral.',
        'MOVIMIENTO diario: el ejercicio fisico es indispensable para una buena salud y el tránsito intestinal no escapa a esta regla. Cuando te moves favoreces la activación de los movimientos peristálticos.',
        'Toma un vaso de agua filtrada o mineral tibia, en ayunas, junto a un kiwi o 3 ciruelas (desecadas/pasas).',
        '1 cucharada de aceite de oliva + gotitas de limon antes de las comidas.',
        '1 cucharada de semillas de lino o chia en medio vaso de agua. Dejar remojando toda la noche y consumir la mañana siguiente.',
        'Evaluar suplementación con magnesio.',
        'Reposo digestivo nocturno de 12 horas: intentarlo todos los dias.',
        'Masaje intestinal (ver ejercicio específico).'
      ]},
      { type: 'quote', content: 'El cuerpo siempre habla. Aprender a escucharlo con compasión, sin juicio, es la base de cualquier proceso de sanación verdadero.', author: 'Dra. Silvia Losinno' }
    ]
  },
  {
    id: 'rutina_matutina',
    imageUrl: 'https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?w=840&h=240&fit=crop&crop=center',
    imageAlts: [
      'https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?w=840&h=240&fit=crop&crop=center',
      'https://images.unsplash.com/photo-1508739773434-c26b3d09e071?w=840&h=240&fit=crop&crop=center',
      'https://images.unsplash.com/photo-1520333789090-1afc82db536a?w=840&h=240&fit=crop&crop=center',
    ],
    icon: '🌅', label: 'Rutina Matutina',
    title: 'Rutina Matutina',
    subtitle: 'Tu inicio: como empezar el dia con intención y calma',
    sections: [
      { type: 'heading', content: 'La mañana: un momento de vulnerabilidad y oportunidad' },
      { type: 'text', content: 'La mañana es un momento de mucha vulnerabilidad para nuestro organismo. Viene de un proceso profundo de limpieza y reparación durante la noche (el cual no somos conscientes) mientras dormimos y cada despertar es una nueva oportunidad de vida y queda en nosotros trabajar para que el primer estimulo de nuestro dia (que va a generar mucho impacto) sea con calma y amabilidad. Ese inicio va a repercutir mucho en lo que va a ser el resto de tu dia.' },
      { type: 'heading', content: 'Los 10 pasos de la rutina matutina' },
      { type: 'bullets', content: [
        '1. Es clave (en lo posible) dejar el telefono en modo avion o lejos de nuestra cama. Ideal no agarrar el celular hasta media hora minimo despues de levantarnos.',
        '2. Cuando te despiertes (ya sea con alarma o sin) te invito a hacer un breve escaneo corporal desde la cama, para registrarNOS. Un buen momento para hacer el MASAJE INTESTINAL (en caso de tener más tiempo).',
        '3. Levantate de la cama idealmente sobre tu lado izquierdo. Podes estirar un poco el cuerpo (brazos, cuello, espalda etc.) con suavidad, y hacer un par de respiraciones conscientes.',
        '4. Despues de eso abrir las cortinas, mirar hacia afuera unos minutos. Que nuestra retina (ojo) registre luz natural. Si tenes la posibilidad podes salir unos minutos a contemplar.',
        '5. Seguimos por una rutina de higiene bucal. OIL PULLING (ver ejercicio) + cepillado de dientes.',
        '6. Posterior a la limpieza, un buen vaso de agua templada (ni fria, ni caliente).',
        '7. Mindful pooping: ir al baño con atención plena. Intentar.',
        '8. Tener a mano un cuaderno para escribir todos los dias: 3 cosas por las que estes agradecido, 3 palabras que describan como te levantaste (sensaciones fisicas, mentales, emocionales) y 3 objetivos o actividades para concretar este dia. La escritura se puede dar en cualquier momento del dia. Podes conectar con el flujo de conciencia matutino y escribir directamente lo que salga de vos, sin ponerle mucha mente.',
        '9. Si te animas, podes arrancar con alguna meditación o con algo de movimiento (ya sea que salgas a caminar o tengas tu horario de entrenamiento) etc. Recomiendo prender el celular lo más lejos de la rutina matinal posible.',
        '10. (Opcional) tener el cuadernito cerca para anotar o registrar cosas puntuales de tus dias. Escribi pensamientos recurrentes, sentimientos, reflexiones, ideas, creatividad, que elemento fue clave en tu dia, que elemento predomina en mi, en que area de los sentidos hubo foco hoy (escuchar, hablar, mirar, tocar, mover).'
      ]},
      { type: 'quote', content: 'No necesitas 2 horas de rituales. Con 20 minutos bien elegidos podes transformar completamente tu dia.', author: 'Dra. Silvia Losinno' }
    ]
  },
  {
    id: 'elementos',
    imageUrl: 'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=840&h=240&fit=crop&crop=center',
    imageAlts: [
      'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=840&h=240&fit=crop&crop=center',
      'https://images.unsplash.com/photo-1564485377539-4af72d585165?w=840&h=240&fit=crop&crop=center',
      'https://images.unsplash.com/photo-1470116945706-e6bf5d5a53ca?w=840&h=240&fit=crop&crop=center',
    ],
    icon: '🌀', label: 'Elementos de la Naturaleza',
    title: 'Elementos de la Naturaleza',
    subtitle: 'Herramientas sensoriales y corporales para el bienestar integral',
    sections: [
      { type: 'heading', content: 'Los cinco elementos y su expresión en el cuerpo' },
      { type: 'text', content: 'Cada elemento integra nuestro organismo. Todos son parte de todos, pero existen momentos en que los canales de energía vinculados a un elemento específico pueden estar más equilibrados y otros un poco más dispersos, con tendencia a habitarlos de manera más exagerada o con deficiencia de este.' },
      { type: 'text', content: 'Tener en cuenta estas formas de pensarNOS ayuda a conectar con lo que estamos necesitando de momento a momento, trabajando sobre el elemento que nos ayudaria a potenciar la etapa de nuestra vida que estemos atravesando o en algun momento puntual. Tambien podemos reconocer de donde viene la carencia de alguno para poder estimular justamente eso que nos vendria bien aumentar, o reconocemos que tenemos alguno muy aumentado y necesitamos equilibrar con otros.' },
      { type: 'heading', content: 'ELEMENTO AIRE — Movimiento y pensamiento' },
      { type: 'text', content: 'Se relaciona con lo ligero, pero muy movil y volatil. Podria representarse a traves del viento, el cielo, elementos en estado gaseoso. Es frio, seco, ligero, movil, aspero y claro. Es la fuerza responsable del movimiento, nuestras extremidades se mueven gracias a la fuerza del aire. Se lo relaciona con el sentido del tacto. Las manos estan asociadas a este elemento. En el cuerpo se lo asocia con el movimiento de los impulsos nerviosos, de la respiración y de las extremidades (caminata ligera. Pies en el aire). A nivel mental es responsable del movimiento de los pensamientos.' },
      { type: 'text', content: 'Movimiento fisico: Control motor y del propio cuerpo. Tecnicas básicas para el desarrollo del core y la estabilidad central. Se usan superficies inestables y deslizantes, entrenamiento en suspension. Se hacen fondos, dominadas, planchas etc. Ejercicios de estabilidad en movimiento. Se asocia a la danza clasica, ballet, house. Deportes conectados al viento (kite, paracaidismo etc).' },
      { type: 'heading', content: 'Elemento aire equilibrado' },
      { type: 'bullets', content: [
        'Nos ayuda a actuar en base a nuestras ideas, pensamientos, creencias.',
        'Nos permite trascender el materialismo y el apego a cosas innecesarias, a sentir la seguridad dentro de nosotros mismos, a primar lo esencial y a ser independientes. A sentirnos libres de las opiniones de los demás y a ser fieles a nosotros mismos.',
        'Creatividad, curiosidad, cambio.',
        'Nos facilita la comunicación con otros, y la expresión de nuestros pensamientos, ideas, creencias a traves de la palabra, la escritura, etc. Nos da la capacidad para persuadir, convencer, negociar.',
        'Nos ayuda a transgredir lo establecido, a ser originales y fieles a nosotros mismos, a ser justos y a cuestionar las normas.',
        'Nos anima a cambiar en funcion de nuestras ideas. No da miedo el cambio de ideas y mentalidad, al reves, lo ve como parte esencial de la evolución personal y de la sociedad.',
        'Tambien nos deja sentir compasión y empatia hacia los demás, y actuar por el bien comun, aunque esto vaya en contra de los intereses personales.'
      ]},
      { type: 'heading', content: 'Reflexión sobre el Aire' },
      { type: 'bullets', content: [
        'Describir lo que se te ocurra que venga a tu mente sobre este elemento. Puede ser detalles personales, similitudes con la naturaleza, energía.',
        'Observa tu manera de pisar, ¿necesita ser una pisada más firme? ¿O necesitas más liviandad en tu vida? ¿En que aspectos lo consideras?',
        '¿Donde necesitas sacar peso, sacar carga? ¿En que eslabones de tu vida?',
        '¿Como vivis el aire en desequilibrio o con actividad exagerada? ¿Te cuesta hacer foco? ¿Te cuesta concentrarte? ¿Reconoces la "realidad" como tal?',
        '¿Como vivis tus propios pensamientos? ¿Te invaden? ¿Sentis que te pertenecen o logras despersonalizarte de algunos?',
        '¿Te cuesta tomar decisiones firmes?'
      ]},
      { type: 'heading', content: 'ELEMENTO TIERRA — Estructura y fuerza' },
      { type: 'text', content: 'Se relaciona con aquello que es solido, estable, firme y que sostiene, como la tierra misma. Podria representarse a traves de un arbol, de las montañas, las rocas, con cualidades de estabilidad. Otras cualidades: frio, seco, pesado, estatico, aspero y opaco. En el cuerpo humano, esta relacionada con los huesos, cartilagos, unas, musculos, tendones y piel. Se la asocia con el sentido del olfato, la nariz y el año. Contribuye también a la estabilidad de la mente.' },
      { type: 'text', content: 'Movimiento fisico: Todo lo relacionado con el entrenamiento de fuerza. Manejo de cargas (kettlebells, balones medicinales, barras...), sentadillas, press y peso muerto. Ejercicios de FUERZA. Se relaciona también a deportes en la montaña, a deportes terrenales. En la danza puede estar asociado al afro.' },
      { type: 'heading', content: 'Elemento tierra equilibrado' },
      { type: 'bullets', content: [
        'Nos ayuda a trabajar en nuestros objetivos y a generar abundancia. Nos da la vision sensata y sabia para establecer objetivos, la disciplina y la constancia.',
        'Paciencia, constancia, equilibrio, estabilidad. RAIZ.',

      { type: 'bullets', content: [

        '¿Como seria el elemento tierra en desequilibrio, en exceso? Pensa en tus formas, en tu rutina, en las cosas que no te animaste a hacer. ¿Te sentis estancado?'

      { type: 'heading', content: 'ELEMENTO AGUA — Fluidez y emociones' },
      { type: 'text', content: 'Se relaciona con aquello que es conductor y adaptable. Podria representarse a traves de un rio, el mar o la lluvia. Es fria, humeda, pesada, movil, suave y opaca. En nuestro cuerpo la proporcion de agua es del 70%. Este elemento lo encontramos en forma grasa, fluidos corporales, linfa, sangre, entre otros. Se le relaciona con el sentido del gusto, la lengua y los genitales. Se le atribuye también emociones amables, carinosas y compasivas.' },
      { type: 'text', content: 'Movimiento fisico: En el agua se tratan todas las técnicas que sirven para compensar los eslabones debiles y desajustes propios del cuerpo durante la vida diaria. Tambien se desarrollan rutinas de flexibilidad por cadenas musculares, reequilibrio de los nucleos articulares que suelen lesionarse con mayor frecuencia (hombro, muñeca, rodillas, tobillos y columna), liberacion miofascial. Deportes acuaticos (surf, natacion, kite, windsurf) y deportes de nieve (snowboard, ski).' },

      { type: 'bullets', content: [

      { type: 'bullets', content: [

      { type: 'heading', content: 'ELEMENTO FUEGO — Digestion y motivación' },
      { type: 'text', content: 'Se relaciona con lo que es ardiente, apasionado, agresivo, pero al mismo tiempo, purifica, impulsa, cautiva. Podria representarse a traves de las llamas del fuego, el rayo y su poder (descontrolado, provoca llamas y destrucción; controlado, da lugar a la electricidad y al avance, al progreso). Es caliente, seco, ligero, movil y aspero. Se le asocia con el calor, la luz y facilita la transformacion. A nivel fisiologico, el fuego es responsable de la digestión. Se le vincula con el sentido de la vista y con los pies. El fuego también es la energía que nos permite avanzar. Nuestra motivación y estimulo por movernos hacia adelante dependera de la fuerza del fuego en nuestro organismo. Al fuego se le relaciona con la percepción.' },
      { type: 'text', content: 'Movimiento fisico: Trabajo cardiovascular, adaptado en todo momento a las necesidades propias de cada persona. Tambien rutinas de calentamiento dinamico o HIIT (high intensity interval training). Ejercicios de velocidad, pasadas, carreras.' },

      { type: 'heading', content: 'Reflexión sobre el Fuego' },
      { type: 'bullets', content: [

        'Al preparar el mate: usar 50% de yerba mate orgánica + 50% de esta mezcla de hierbas.',

// ── USO DE TEMAS (persistencia en localStorage) ────────────────────────────────
const USAGE_KEY = 'losinno_topic_usage';
function loadUsage() {
  try { return JSON.parse(localStorage.getItem(USAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveUsage(u) { try { localStorage.setItem(USAGE_KEY, JSON.stringify(u)); } catch(e) {} }
function incrementUsage(ids) {
  const u = loadUsage();
  ids.forEach(id => { u[id] = (u[id] || 0) + 1; });
  saveUsage(u);
}
function getUsage(id) { return loadUsage()[id] || 0; }

// ── ORDENAMIENTO Y BÚSQUEDA ────────────────────────────────────────────────────
let sortMode = 'usos'; // 'usos' | 'az'
let searchQuery = '';

function setSortMode(mode) {
  sortMode = mode;
  document.getElementById('sortUsos').classList.toggle('active', mode === 'usos');
  document.getElementById('sortAz').classList.toggle('active', mode === 'az');
  renderTopicGrid();
}

function filterTopics(q) {
  searchQuery = q.toLowerCase().trim();
  renderTopicGrid();
}

function sortedTopics() {
  const usage = loadUsage();
  let list = [...TOPICS];
  if (sortMode === 'usos') {
    list.sort((a, b) => {
      const diff = (usage[b.id] || 0) - (usage[a.id] || 0);
      if (diff !== 0) return diff;
      return a.label.localeCompare(b.label, 'es');
    });
  } else {
    list.sort((a, b) => a.label.localeCompare(b.label, 'es'));
  }
  return list;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderMaterial(data) {
  // Header
  document.getElementById('headerNombre').textContent = data.paciente || '';
  const fecha = data.creado
    ? new Date(data.creado + 'T00:00:00').toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' })
    : '';
  document.getElementById('headerFecha').textContent = fecha ? `Generado el ${fecha}` : '';

  // Temas
  const container = document.getElementById('temasContainer');
  const allTopics = [...TOPICS, ...MID_BANNERS];

  data.orden.forEach((id, idx) => {
    const topic = allTopics.find(t => t.id === id);
    if (!topic) return;

    // Banner intermedio
    if (topic.id.startsWith('mid_banner')) {
      const imgUrl = (data.fotos && data.fotos[id]) || topic.imageAlts[0];
      const div = document.createElement('div');
      div.className = 'mid-banner';
      div.innerHTML = `<img src="${imgUrl}" alt="imagen decorativa" loading="lazy">`;
      container.appendChild(div);
      return;
    }

    // Tema normal
    const imgUrl = (data.fotos && data.fotos[id]) || topic.imageAlts[0];
    const div = document.createElement('div');
    div.className = 'tema';

    let sectionsHtml = '';
    (topic.sections || []).forEach(s => {
      if (s.type === 'heading') {
        sectionsHtml += `<div class="tema-heading">${s.content}</div>`;
      } else if (s.type === 'text') {
        sectionsHtml += `<p class="tema-text">${s.content}</p>`;
      } else if (s.type === 'bullets') {
        sectionsHtml += `<ul class="tema-bullets">${s.content.map(b => `<li>${b}</li>`).join('')}</ul>`;
      } else if (s.type === 'quote') {
        sectionsHtml += `<blockquote class="tema-quote"><p>\u201C${s.content}\u201D</p>${s.author ? `<cite>\u2014 ${s.author}</cite>` : ''}</blockquote>`;
      }
    });

    div.innerHTML = `
      <div class="tema-img-wrap">
        <img class="tema-img" src="${imgUrl}" alt="${topic.title}" loading="lazy">
      </div>
      <div class="tema-body">
        <div class="tema-title">${topic.title}</div>
        ${topic.subtitle ? `<div class="tema-subtitle">${topic.subtitle}</div>` : ''}
        <hr class="tema-separator">
        ${sectionsHtml}
      </div>`;
    container.appendChild(div);

    // Insertar encabezado repetido + banner decorativo entre temas

const MAX_RETRIES = 10;
const RETRY_INTERVAL = 8000; // 8 segundos entre intentos

async function fetchMaterial(url, attempt) {
  const res = await fetch(url + '?t=' + Date.now());
  if (!res.ok) throw new Error('not_found');
  return res.json();
}

async function init() {
  const id = window.location.hash.slice(1);

  if (!id) {
    showError('No se especificó ningún material. El link puede estar incompleto.');
    return;
  }

  const url = `https://raw.githubusercontent.com/enohcaid/losinno-material-educativo/refs/heads/gh-pages/m/${id}.json`;

  for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
    try {
      const data = await fetchMaterial(url, attempt);
      renderMaterial(data);
      return;
    } catch(e) {
      if (e.message !== 'not_found') {
        // Error de red — mostrar mensaje
        showError('No se pudo cargar el material. Revisá tu conexión e intentá de nuevo.');
        return;
      }
      if (attempt < MAX_RETRIES) {
        // Todavía no propagó — mostrar mensaje amigable y reintentar
        const remaining = MAX_RETRIES - attempt;
        document.querySelector('.loading-text').textContent =
          `Preparando tu material, un momento${'.'.repeat(attempt % 4)}`;
        await new Promise(r => setTimeout(r, RETRY_INTERVAL));
      } else {
        showError('Tu material todavía se está procesando. Esperá unos minutos y volvé a abrir el link.');
      }
    }
  }
}

init();
</script>
</body>
</html>
